services:
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sjm}:${POSTGRES_PASSWORD:-sjm}@postgres:5432/${POSTGRES_DB:-sjm_sports}
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sjm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sjm}
      POSTGRES_DB: ${POSTGRES_DB:-sjm_sports}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sjm}:${POSTGRES_PASSWORD:-sjm}@postgres:5432/${POSTGRES_DB:-sjm_sports}
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head

volumes:
  postgres_data:
